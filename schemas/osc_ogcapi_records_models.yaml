$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.opengis.net/ogcapi/records/part1/1.0/osc

$defs:

  WorkflowProperties:
    type: object
    properties:
      'osc:project':
        type: string

  ExperimentProperties:
    type: object
    properties:
      'osc:workflow':
        type: string
        format: uri
      'osc-prov:generatedBy':
        type: string
      'osc-prov:startedAtTime':
        type: string
        format: date-time
      'osc-prov:endedAtTime':
        type: string
        format: date-time
      'osc-prov:generated':
        type: string
      'osc-prov:describedByWorkflow':
        type: string
        format: uri

  ProductProperties:
    type: object
    properties:
      "osc:experiment":
        type: string
      "osc:status":
        type: string
      "osc:region":
        type: string
      "osc:type":
        type: string
      "osc:project":
        type: string
      "osc:missions":
        type: string
      "osc:variables":
        type: string
      "osc-prov:type":
        type: string
      "osc-prov:wasDerivedFrom":
        type: string
      "osc-prov:wasOutputFrom":
        type: string
      "osc-prov:describedByParameter":
        type: string
